<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Ichimon's Page</title>
</head>
<body>
<h1>Welcome</h1>
<p>This is where I learn stuff</p>

<!-- Create a clickable button -->
<button onclick="handleButtonClick()">Cuba Tekan</button>

<!-- Optional: Add a script to define the button's behavior -->
<script>
    function customConfirm(message, yesCallback, noCallback) {
        var modal = document.createElement('div');
        modal.innerHTML = `
            <div style="background-color: #fff; padding: 20px; border: 1px solid #ccc; text-align: center;">
                <p>${message}</p>
                <button onclick="${yesCallback}()">Yes</button>
                <button onclick="${noCallback}()">No</button>
            </div>
        `;
        
        document.body.appendChild(modal);
    }

    function handleButtonClick() {
        // Display a custom confirmation dialog
        customConfirm('Do you want to proceed?', 'handleYesClick', 'handleNoClick');
    }

    function handleYesClick() {
        alert('You clicked "Yes"');
        // Add any additional actions for "Yes"
        // Remove the custom modal after processing
        removeCustomModal();
    }

    function handleNoClick() {
        // Display a custom confirmation dialog again
        customConfirm('Are you sure you want to say "No" again?', 'handleYesClick', 'handleNoClick');
    }

    function removeCustomModal() {
        // Remove the custom modal from the DOM
        var modal = document.querySelector('div');
        if (modal) {
            modal.parentNode.removeChild(modal);
        }
    }
</script>
</body>
</html>
