<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Ichimon's Page</title>
</head>
<body>
<h1>Welcome</h1>
<p>This is where I learn stuff</p>

<!-- Create a clickable button -->
<button onclick="handleButtonClick()">Click Me</button>

<!-- Optional: Add a script to define the button's behavior -->
<script>
    function handleButtonClick() {
        // Display a confirmation dialog
        var userResponse = confirm('Do you want to proceed?');

        // Check the user's response
        if (userResponse) {
            alert('You clicked "Yes"');
            // Add any additional actions for "Yes"
        } else {
            // Keep showing confirmation dialogs until the user clicks "Yes"
            while (!userResponse) {
                userResponse = confirm('Are you sure you want to say "No" again?');
            }

            // Once the user clicks "Yes," display an alert
            alert('Finally! You clicked "Yes"');
            // Add any additional actions for "Yes"
        }
    }
</script>
</body>
</html>
