<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Rolling Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #cat {
            position: absolute;
            width: 100px;
            height: 100px;
            background: url('https://placekitten.com/100/100') no-repeat;
            background-size: cover;
            transition: transform 0.5s linear;
        }
    </style>
</head>

<body>
    <div id="cat"></div>

    <script>
        const cat = document.getElementById('cat');

        let rotateDeg = 0;

        function rollCat() {
            rotateDeg += 360; // Increment rotation by 360 degrees
            cat.style.transform = `rotate(${rotateDeg}deg)`;
        }

        // Roll the cat every 2 seconds
        setInterval(rollCat, 2000);
    </script>
</body>

</html>
